<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>房屋模型预览 — 精细化体素</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#F2EFE9; }
  #app { width:100%; height:100%; }
  #ui {
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:10;
    display:flex; gap:12px; padding:8px 20px;
    background:rgba(248,246,240,0.94); border-radius:10px;
    box-shadow:0 1px 4px rgba(0,0,0,0.04);
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif; font-size:12px; color:#666;
  }
  #ui button {
    padding:4px 14px; border:1px solid #e0dcd4; border-radius:6px;
    background:#fff; color:#888; cursor:pointer; font-size:11px;
    font-family:inherit; transition: all 0.15s;
  }
  #ui button:hover { background:#f5f3ed; color:#555; }
  #ui button.active { background:#e8e4d8; color:#555; font-weight:600; border-color:#d8d4c8; }
  #info {
    position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:10;
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
    font-size:11px; color:#aaa; pointer-events:none;
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="info">拖拽旋转 · 滚轮缩放 · 右键平移 · 悬停1秒查看颜色 · 底部分类筛选</div>
<div id="fps" style="position:fixed;top:14px;right:14px;z-index:20;font-family:'Segoe UI',system-ui,sans-serif;font-size:11px;color:#888;pointer-events:none;">FPS: --</div>
<div id="tooltip" style="
  position:fixed; z-index:100; pointer-events:none;
  background:rgba(0,0,0,0.75); color:#fff; padding:4px 8px;
  border-radius:4px; font-family:'Segoe UI',system-ui,sans-serif;
  font-size:11px; display:none; white-space:nowrap;
"></div>
<div id="ui">
  <button class="active" data-cat="all">全部</button>
  <button data-cat="house">房屋</button>
  <button data-cat="facility">设施</button>
  <button data-cat="decoration">装饰</button>
  <span style="color:#ddd;margin:0 4px;">|</span>
  <button id="btn-reset">重置视角</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { BokehPass } from 'three/addons/postprocessing/BokehPass.js';
import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';

// ─── Renderer (exact match to main.ts) ──────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;
document.getElementById('app').appendChild(renderer.domElement);

// ─── Scene ──────────────────────────────────
const scene = new THREE.Scene();
const fogColor = new THREE.Color('#F2EFE9');
scene.background = fogColor;
scene.fog = new THREE.Fog(fogColor, 40, 80);

// ─── Camera ─────────────────────────────────
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.5, 120);
camera.position.set(10, 7, 10);
camera.lookAt(0, 0.8, 0);

// ─── Controls ───────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0.8, 0);
controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.PAN, RIGHT: THREE.MOUSE.PAN };
controls.update();

// ─── Lighting (exact match to main.ts) ──────
const ambient = new THREE.AmbientLight('#f0ebe0', 1.6);
scene.add(ambient);
const hemi = new THREE.HemisphereLight('#fff8f0', '#d8d0c4', 1.0);
scene.add(hemi);
const sun = new THREE.DirectionalLight('#fffdf5', 2.7);
sun.position.set(25, 35, 15);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.radius = 2.5;
sun.shadow.bias = -0.00015;
sun.shadow.normalBias = 0.02;
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 120;
sun.shadow.camera.left = -40;
sun.shadow.camera.right = 40;
sun.shadow.camera.top = 40;
sun.shadow.camera.bottom = -40;
scene.add(sun);

// ─── Post-processing ────────────────────────
const renderPass = new RenderPass(scene, camera);
const composer = new EffectComposer(renderer);
composer.addPass(renderPass);
const bokehPass = new BokehPass(scene, camera, {
  focus: camera.position.distanceTo(new THREE.Vector3(0, 0.8, 0)),
  aperture: 0.0006,
  maxblur: 0.014,
});
composer.addPass(bokehPass);

// ─── Ground ─────────────────────────────────
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({ color: '#c5d8b0', roughness: 0.9, metalness: 0 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ─── Material helpers ───────────────────────
const matCache = new Map();
function mat(hex, opts) {
  opts = opts || {};
  const key = hex + '|' + (opts.roughness != null ? opts.roughness : 0.9) + '|' +
    (opts.transparent ? '1' : '0') + '|' + (opts.opacity != null ? opts.opacity : '1');
  if (matCache.has(key)) return matCache.get(key);
  const m = new THREE.MeshStandardMaterial({
    color: hex, roughness: opts.roughness != null ? opts.roughness : 0.9, metalness: 0,
    transparent: opts.transparent || false,
    opacity: opts.opacity != null ? opts.opacity : 1,
    depthWrite: opts.depthWrite != null ? opts.depthWrite : !opts.transparent,
  });
  matCache.set(key, m);
  return m;
}

function block(geo, material, x, y, z, shadow = true) {
  const m = new THREE.Mesh(geo, material);
  m.position.set(x, y, z);
  if (shadow) { m.castShadow = true; m.receiveShadow = true; }
  return m;
}

// Reusable geometries (voxel unit = 0.25 for fine detail)
const U = 0.25; // base voxel unit
const B = (sx, sy, sz) => new THREE.BoxGeometry(sx * U, sy * U, sz * U);

// ─── Window helpers ─────────────────────────
const windowGlowMat = new THREE.MeshStandardMaterial({
  color: '#fff8e0', roughness: 0.3, metalness: 0,
  emissive: '#ffe8c0', emissiveIntensity: 0.15,
});
const windowFrameMat = mat('#8b7355');
const sillMat = mat('#c8b898');
const shutterMat = mat('#a08060');

function addWindow(g, wx, wy, wz, rotY = 0, hasShutters = false, hScale = 1) {
  const wg = new THREE.Group();
  const gh = 5 * hScale;  // glass height in U
  const fh = gh + 0.4;    // frame side height
  const halfGH = gh / 2;
  // Window glass
  wg.add(block(B(3, gh, 0.2), windowGlowMat, 0, 0, 0));
  // Frame top/bottom
  wg.add(block(B(3.4, 0.6, 0.3), windowFrameMat, 0, (halfGH + 0.2) * U, 0.05));
  wg.add(block(B(3.4, 0.6, 0.3), windowFrameMat, 0, -(halfGH + 0.2) * U, 0.05));
  // Frame sides
  wg.add(block(B(0.6, fh, 0.3), windowFrameMat, 1.7 * U, 0, 0.05));
  wg.add(block(B(0.6, fh, 0.3), windowFrameMat, -1.7 * U, 0, 0.05));
  // Sill
  wg.add(block(B(4, 0.6, 0.8), sillMat, 0, -(halfGH + 0.6) * U, 0.2));
  // Shutters
  if (hasShutters) {
    wg.add(block(B(1.4, gh, 0.3), shutterMat, 2.1 * U, 0, 0.1));
    wg.add(block(B(1.4, gh, 0.3), shutterMat, -2.1 * U, 0, 0.1));
  }
  wg.position.set(wx, wy, wz);
  wg.rotation.y = rotY;
  g.add(wg);
}

// ─── Door helpers ───────────────────────────
const doorMat = new THREE.MeshStandardMaterial({ color: '#6b4226', roughness: 0.85, metalness: 0 });
const doorFrameMat = mat('#8b7355');
const stepMat = mat('#c0b8a8');

function addDoor(g, dx, dy, dz, rotY = 0) {
  const dg = new THREE.Group();
  // Door
  dg.add(block(B(3.2, 7, 0.4), doorMat, 0, 0.8 * U, 0));
  // Frame
  dg.add(block(B(3.6, 0.6, 0.5), doorFrameMat, 0, 4.2 * U, 0.05));
  dg.add(block(B(0.6, 7.6, 0.5), doorFrameMat, 1.9 * U, 0.8 * U, 0.05));
  dg.add(block(B(0.6, 7.6, 0.5), doorFrameMat, -1.9 * U, 0.8 * U, 0.05));
  // Step (sits at ground level, offset by door's dy)
  dg.add(block(B(4.5, 0.8, 0.8), stepMat, 0, -dy, 0.3));
  dg.position.set(dx, dy, dz);
  dg.rotation.y = rotY;
  g.add(dg);
}

// ─── Roof helpers ───────────────────────────
function addGableRoof(g, w, d, h, baseY, color1, color2) {
  const rw = w * U; // full width in world units
  const rd = d * U;
  const rh = h * U;
  const hw = rw / 2;

  // Ridge beam
  g.add(block(new THREE.BoxGeometry(rw + 0.2, 0.15, 0.3), mat('#8b7355'), 0, baseY + rh, 0));

  // Roof tiles — build from rows of thin blocks with color variation
  const tileH = 0.18;
  const tileD = 0.4;
  const rows = Math.ceil(rh / tileH);
  for (let row = 0; row < rows; row++) {
    const y = baseY + row * tileH + tileH / 2;
    const t = row / rows;
    const rowW = rw * (1 - t);
    const rowZ = (rd / 2) * t;
    const useColor2 = row % 3 === 1;

    // Left slope
    const leftTile = new THREE.Mesh(
      new THREE.BoxGeometry(rowW / 2, tileH, rd + 0.1),
      mat(useColor2 ? color2 : color1)
    );
    leftTile.position.set(-rowW / 4, y, 0);
    leftTile.castShadow = true; leftTile.receiveShadow = true;
    g.add(leftTile);

    // Right slope
    const rightTile = new THREE.Mesh(
      new THREE.BoxGeometry(rowW / 2, tileH, rd + 0.1),
      mat(useColor2 ? color2 : color1)
    );
    rightTile.position.set(rowW / 4, y, 0);
    rightTile.castShadow = true; rightTile.receiveShadow = true;
    g.add(rightTile);
  }

  // Eaves (overhang trim)
  g.add(block(new THREE.BoxGeometry(rw + 0.4, 0.12, rd + 0.4), mat('#a09080'), 0, baseY + 0.06, 0));
}

// ─── Chimney ────────────────────────────────
function addChimney(g, cx, cz, baseY, height) {
  const stoneColors = ['#b0a898', '#a89888', '#c0b8a8', '#a09080'];
  const h = height * U;
  for (let i = 0; i < 6; i++) {
    const y = baseY + i * 0.35;
    const c = stoneColors[i % stoneColors.length];
    g.add(block(new THREE.BoxGeometry(0.5, 0.35, 0.5), mat(c), cx, y, cz));
  }
  // Chimney pot
  g.add(block(new THREE.BoxGeometry(0.35, 0.4, 0.35), mat('#8b7355'), cx, baseY + h + 0.2, cz));
  // Top rim
  g.add(block(new THREE.BoxGeometry(0.6, 0.1, 0.6), mat('#a09080'), cx, baseY + h, cz));
}

// ─── Foundation ─────────────────────────────
function addFoundation(g, w, d) {
  const stoneColors = ['#c0b8a8', '#b8b0a0', '#c8c0b0', '#b0a898'];
  const pad = 0;
  for (let ix = 0; ix < w; ix++) {
    for (let iz = 0; iz < d; iz++) {
      const c = stoneColors[(ix + iz * 3) % stoneColors.length];
      const bx = (-(w - 1) / 2 + ix) * U;
      const bz = (-(d - 1) / 2 + iz) * U;
      g.add(block(B(1, 1.5, 1), mat(c), bx, 0.75 * U, bz));
    }
  }
}

// ─── Textured wall builder ──────────────────
function addTexturedWall(g, w, h, d, baseY, baseColor, variationColors) {
  const colors = [baseColor, ...variationColors];
  const bodyW = w * U;
  const bodyH = h * U;
  const bodyD = d * U;
  const hw = bodyW / 2;
  const hd = bodyD / 2;

  // Front & back walls
  for (let row = 0; row < h; row++) {
    const y = baseY + row * U + U / 2;
    for (let col = 0; col < w; col++) {
      const x = -hw + col * U + U / 2;
      const ci = (row * 7 + col * 3) % colors.length;
      // Front
      g.add(block(B(1, 1, 0.5), mat(colors[ci]), x, y, hd + U * 0.2));
      // Back
      g.add(block(B(1, 1, 0.5), mat(colors[(ci + 2) % colors.length]), x, y, -hd - U * 0.2));
    }
  }

  // Left & right walls
  for (let row = 0; row < h; row++) {
    const y = baseY + row * U + U / 2;
    for (let col = 0; col < d; col++) {
      const z = -hd + col * U + U / 2;
      const ci = (row * 5 + col * 3) % colors.length;
      g.add(block(B(0.5, 1, 1), mat(colors[ci]), hw + U * 0.2, y, z));
      g.add(block(B(0.5, 1, 1), mat(colors[(ci + 2) % colors.length]), -hw - U * 0.2, y, z));
    }
  }

  // Corner posts (slightly different color for trim effect)
  const cornerMat = mat(variationColors[0] || baseColor);
  for (let row = 0; row < h; row++) {
    const y = baseY + row * U + U / 2;
    g.add(block(B(0.7, 1, 0.7), cornerMat, hw, y, hd));
    g.add(block(B(0.7, 1, 0.7), cornerMat, -hw, y, hd));
    g.add(block(B(0.7, 1, 0.7), cornerMat, hw, y, -hd));
    g.add(block(B(0.7, 1, 0.7), cornerMat, -hw, y, -hd));
  }
}

// ─── Leaf texture generator ───────────────────
function makeLeafTex(baseGreen) {
  const c = document.createElement('canvas');
  c.width = 64; c.height = 64;
  const ctx = c.getContext('2d');
  ctx.fillStyle = baseGreen;
  ctx.fillRect(0, 0, 64, 64);
  for (let i = 0; i < 200; i++) {
    const x = Math.random() * 64;
    const y = Math.random() * 64;
    const r = Math.random() * 3 + 1;
    const shade = Math.random() * 40 - 20;
    const r2 = parseInt(baseGreen.slice(1,3), 16) + shade;
    const g2 = parseInt(baseGreen.slice(3,5), 16) + shade;
    const b2 = parseInt(baseGreen.slice(5,7), 16) + shade;
    ctx.fillStyle = 'rgb(' + Math.max(0,Math.min(255,r2)) + ',' + Math.max(0,Math.min(255,g2)) + ',' + Math.max(0,Math.min(255,b2)) + ')';
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(2, 2);
  tex.minFilter = THREE.LinearMipmapLinearFilter;
  tex.magFilter = THREE.LinearFilter;
  tex.generateMipmaps = true;
  return tex;
}
const leafTexLight = makeLeafTex('#b0c8a0');
const leafTexMid = makeLeafTex('#98b888');
const leafTexDark = makeLeafTex('#80a878');
const leafTexPale = makeLeafTex('#c0d4b0');

function leafMat(color, tex) {
  return new THREE.MeshStandardMaterial({ color: color, roughness: 0.85, metalness: 0, map: tex });
}

// ─── Geometry merging ──────────────────────────
function mergeGroupMeshes(group) {
  // Force world matrix update for group and all descendants
  group.updateWorldMatrix(true, true);

  const buckets = new Map();
  const removals = [];
  const invGroupWorld = group.matrixWorld.clone().invert();

  group.traverse(child => {
    if (!(child instanceof THREE.Mesh) || child.userData.noMerge) return;
    const geo = child.geometry.clone();
    // Bake local-to-group transform using world matrices
    const localMatrix = invGroupWorld.clone().multiply(child.matrixWorld);
    geo.applyMatrix4(localMatrix);
    const key = child.material.uuid;
    if (!buckets.has(key)) buckets.set(key, { material: child.material, geometries: [] });
    buckets.get(key).geometries.push(geo);
    removals.push(child);
  });

  removals.forEach(m => { if (m.parent) m.parent.remove(m); });

  buckets.forEach(({ material, geometries }) => {
    const merged = mergeGeometries(geometries, false);
    const mesh = new THREE.Mesh(merged, material);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    group.add(mesh);
  });
}

// ═══════════════════════════════════════════
// HOUSE 1: 小木屋 (1x1 grid, warm beige)
// ═══════════════════════════════════════════
function createSmallWoodenHouse() {
  const g = new THREE.Group();
  const W = 5; const D = 5; const H = 6; // voxel units

  addFoundation(g, W + 1, D + 1);
  addTexturedWall(g, W, H, D, 1.5 * U, '#f2d8c0', ['#e8c8b0', '#f0d4b8', '#eed8c4', '#e4c4a8']);
  addGableRoof(g, W + 3, D + 3, 5, (1.5 + H) * U, '#d4a090', '#c89080');
  addChimney(g, 1.0, 0.5, (1.5 + H) * U, 4);

  // Left + right windows only (60% height)
  addWindow(g, -(W/2 + 0.6) * U, (1.5 + 3) * U, 0, -Math.PI/2, false, 0.6);
  addWindow(g, (W/2 + 0.6) * U, (1.5 + 3) * U, 0, Math.PI/2, false, 0.6);

  // Front door
  addDoor(g, 0, 1.5 * U, (D/2 + 0.5) * U, 0);

  return g;
}

// ═══════════════════════════════════════════
// HOUSE 2: 石头小屋 (1x1 grid, stone blue)
// ═══════════════════════════════════════════
function createStoneCottage() {
  const g = new THREE.Group();
  const W = 5; const D = 5; const H = 5;

  addFoundation(g, W + 1, D + 1);
  addTexturedWall(g, W, H, D, 1.5 * U, '#c8d8e8', ['#b8c8d8', '#c0d0e0', '#d0dce8', '#b0c0d0']);
  addGableRoof(g, W + 3, D + 3, 5, (1.5 + H) * U, '#8898b0', '#7890a8');
  addChimney(g, -0.6, -0.5, (1.5 + H) * U, 3.5);

  // Left + right windows only (60% height)
  addWindow(g, -(W/2 + 0.6) * U, (1.5 + 2.5) * U, 0, -Math.PI/2, false, 0.6);
  addWindow(g, (W/2 + 0.6) * U, (1.5 + 2.5) * U, 0, Math.PI/2, false, 0.6);

  // Heavy wooden door with stone lintel
  addDoor(g, 0, 1.5 * U, (D/2 + 0.5) * U, 0);
  // Stone lintel above door
  g.add(block(B(5, 0.6, 1.5), mat('#a0a8b8'), 0, (1.5 + 4.5) * U, (D/2 + 0.6) * U));

  return g;
}

// ═══════════════════════════════════════════
// HOUSE 3: 中型木屋 (2x2 grid, sage green)
// ═══════════════════════════════════════════
function createMediumWoodenHouse(opts) {
  const g = new THREE.Group();
  const houseName = (opts && opts.name) || '中型木屋';
  const W = 10; const D = 10; const H = 8;

  addFoundation(g, W + 1, D + 1);
  addTexturedWall(g, W, H, D, 1.5 * U, '#c0d8c4', ['#b0c8b4', '#b8d0bc', '#c8dcc8', '#a8c0ac']);
  addGableRoof(g, W + 4, D + 4, 7, (1.5 + H) * U, '#8aaa90', '#7a9a80');
  addChimney(g, 2.0, 0.8, (1.5 + H) * U, 5);

  // Front door only
  addDoor(g, 0, 1.5 * U, (D/2 + 0.5) * U, 0);
  // Entry porch roof (above door frame)
  g.add(block(B(5, 0.3, 2.5), mat('#8aaa90'), 0, (1.5 + 4.5) * U, (D/2 + 1.2) * U));

  // Name plaque on front wall
  const plaqueZ = (D/2 + 0.4 + 0.3) * U; // outward by its thickness
  const plaqueY = (1.5 + 6.5) * U;
  g.add(block(B(7, 2, 0.3), mat('#d4c0a0'), 0, plaqueY, plaqueZ));
  // Plaque text — fixed plane on plaque surface
  const plaqueCanvas = document.createElement('canvas');
  plaqueCanvas.width = 512; plaqueCanvas.height = 128;
  const pctx = plaqueCanvas.getContext('2d');
  pctx.fillStyle = '#5a4030';
  pctx.font = 'bold 90px "Segoe UI", system-ui, sans-serif';
  pctx.textAlign = 'center';
  pctx.textBaseline = 'middle';
  pctx.fillText(houseName, 256, 64);
  const plaqueTex = new THREE.CanvasTexture(plaqueCanvas);
  plaqueTex.minFilter = THREE.LinearFilter;
  const textPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(1.5, 0.375),
    new THREE.MeshBasicMaterial({ map: plaqueTex, transparent: true, depthTest: true, depthWrite: false, side: THREE.DoubleSide })
  );
  textPlane.position.set(0, plaqueY, plaqueZ + 0.06);
  textPlane.userData.isPlaque = true;
  textPlane.userData.noMerge = true;
  g.add(textPlane);

  // Left + right windows (match front style)
  addWindow(g, -(W/2 + 0.65) * U, (1.5 + 4.5) * U, 0, -Math.PI/2, true);
  addWindow(g, (W/2 + 0.65) * U, (1.5 + 4.5) * U, 0, Math.PI/2, true);

  // Dormer window on roof (front)
  const dormerY = (1.5 + H) * U + 0.7;
  const dormer = new THREE.Group();
  dormer.add(block(B(3, 3, 2), mat('#c0d8c4'), 0, 0.4, 0));
  dormer.add(block(B(4, 0.3, 3), mat('#8aaa90'), 0, 0.9, 0));
  dormer.add(block(B(3.4, 0.5, 0.3), windowFrameMat, 0, 0.5, 1.05));
  dormer.add(block(B(3.4, 0.5, 0.3), windowFrameMat, 0, -0.15, 1.05));
  dormer.add(block(B(3, 2.5, 0.15), windowGlowMat, 0, 0.18, 1.0));
  dormer.position.set(0, dormerY, (D/2 - 1.7) * U);
  g.add(dormer);

// Side wing wall helper (offset position)
function addTexturedWallAt(g, w, h, d, baseY, baseColor, variationColors, offsetX, offsetZ) {
  const colors = [baseColor, ...variationColors];
  const bodyW = w * U;
  const bodyH = h * U;
  const bodyD = d * U;
  const hw = bodyW / 2;
  const hd = bodyD / 2;

  for (let row = 0; row < h; row++) {
    const y = baseY + row * U + U / 2;
    for (let col = 0; col < w; col++) {
      const x = -hw + col * U + U / 2;
      const ci = (row * 7 + col * 3) % colors.length;
      g.add(block(B(1, 1, 0.5), mat(colors[ci]), offsetX + x, y, offsetZ + hd + U * 0.2));
      g.add(block(B(1, 1, 0.5), mat(colors[(ci + 2) % colors.length]), offsetX + x, y, offsetZ - hd - U * 0.2));
    }
  }
  for (let row = 0; row < h; row++) {
    const y = baseY + row * U + U / 2;
    for (let col = 0; col < d; col++) {
      const z = -hd + col * U + U / 2;
      const ci = (row * 5 + col * 3) % colors.length;
      g.add(block(B(0.5, 1, 1), mat(colors[ci]), offsetX + hw + U * 0.2, y, offsetZ + z));
      g.add(block(B(0.5, 1, 1), mat(colors[(ci + 2) % colors.length]), offsetX - hw - U * 0.2, y, offsetZ + z));
    }
  }
}

// Roof at offset (for side wing)
function addGableRoofAt(g, w, d, h, baseY, color1, color2, ox, oz, rotY, noRidge = false) {
  const rg = new THREE.Group();
  const rw = w * U;
  const rd = d * U;
  const rh = h * U;

  if (!noRidge) rg.add(block(new THREE.BoxGeometry(rw + 0.2, 0.15, 0.3), mat('#8b7355'), 0, baseY + rh, 0));

  const tileH = 0.18;
  const rows = Math.ceil(rh / tileH);
  for (let row = 0; row < rows; row++) {
    const y = baseY + row * tileH + tileH / 2;
    const t = row / rows;
    const rowW = rw * (1 - t);
    const useColor2 = row % 3 === 1;

    const lt = new THREE.Mesh(new THREE.BoxGeometry(rowW / 2, tileH, rd + 0.1), mat(useColor2 ? color2 : color1));
    lt.position.set(-rowW / 4, y, 0);
    lt.castShadow = true; lt.receiveShadow = true;
    rg.add(lt);

    const rt = new THREE.Mesh(new THREE.BoxGeometry(rowW / 2, tileH, rd + 0.1), mat(useColor2 ? color2 : color1));
    rt.position.set(rowW / 4, y, 0);
    rt.castShadow = true; rt.receiveShadow = true;
    rg.add(rt);
  }
  rg.add(block(new THREE.BoxGeometry(rw + 0.4, 0.12, rd + 0.4), mat('#a09080'), 0, baseY + 0.06, 0));

  rg.position.set(ox, 0, oz);
  rg.rotation.y = rotY;
  g.add(rg);
}

  g.add(block(B(4.5, 1.8, 4), leafMat('#98b888', leafTexMid), -0.6, 5 * U, 0.3));
  g.add(block(B(4, 1.8, 4.5), leafMat('#c0d4b0', leafTexPale), 0.5, 5 * U, -0.4));
  g.add(block(B(3.5, 1.5, 3.5), leafMat('#a8c098', leafTexDark), 0, 5 * U, 0));
  g.add(block(B(4, 2, 4), leafMat('#b0c8a0', leafTexLight), 0, 6.2 * U, 0));
  g.add(block(B(3, 1.5, 3), leafMat('#98b888', leafTexMid), 0, 7 * U, 0));
  g.add(block(B(2, 1.2, 2), leafMat('#c0d4b0', leafTexPale), 0, 7.5 * U, 0));
  return g;
}

// ═══════════════════════════════════════════
// DECORATION: 栅栏 (1x1 grid)
// ═══════════════════════════════════════════
function createFence() {
  const g = new THREE.Group();
  const fMat = mat('#e0d8cc');
  // Single post only — rails are added when fences connect in the game
  g.add(block(B(0.5, 3.5, 0.5), fMat, 0, 1.75 * U, 0));
  return g;
}

// Fence connection helper (for preview)
function connectFences(a, b) {
  const ax = a.position.x, az = a.position.z;
  const bx = b.position.x, bz = b.position.z;
  const dx = bx - ax, dz = bz - az;
  const dist = Math.sqrt(dx * dx + dz * dz);
  if (dist < 0.01 || dist > 2.1) return;
  const midX = (ax + bx) / 2;
  const midZ = (az + bz) / 2;
  const railLen = dist / U; // in U units
  const angle = Math.atan2(dz, dx);
  const railG = new THREE.Group();
  const fMat = mat('#e0d8cc');
  railG.add(block(new THREE.BoxGeometry(railLen * U, 0.4 * U, 0.4 * U), fMat, 0, 2.2 * U, 0));
  railG.add(block(new THREE.BoxGeometry(railLen * U, 0.4 * U, 0.4 * U), fMat, 0, 3.2 * U, 0));
  railG.position.set(midX, 0, midZ);
  railG.rotation.y = angle;
  scene.add(railG);
  return railG;
}

// ═══════════════════════════════════════════
// DECORATION: 稻草人 (1x1 grid)
// ═══════════════════════════════════════════
function createScarecrow() {
  const g = new THREE.Group();
  // Post
  g.add(block(B(0.4, 7, 0.4), mat('#b8a888'), 0, 3.5 * U, 0));
  // Crossbar
  g.add(block(B(3, 0.3, 0.3), mat('#b8a888'), 0, 5 * U, 0));
  // Body
  g.add(block(B(1.5, 1.8, 0.8), mat('#d8c8b0'), 0, 5.8 * U, 0));
  // Head
  g.add(block(B(1, 1, 1), mat('#f0d8c0'), 0, 7 * U, 0));
  // Hat
  g.add(block(B(1.4, 0.2, 1.4), mat('#6b4226'), 0, 7.6 * U, 0));
  g.add(block(B(0.8, 0.8, 0.8), mat('#6b4226'), 0, 8.1 * U, 0));
  return g;
}

// ─── All buildings array ────────────────────
const allBuildings = [
  { cat: 'house', name: '小木屋', fn: createSmallWoodenHouse, pos: [-7, 0, 2] },
  { cat: 'house', name: '石头小屋', fn: createStoneCottage, pos: [0, 0, 2] },
  { cat: 'house', name: '中型木屋', fn: createMediumWoodenHouse, pos: [-7, 0, -6] },
  { cat: 'house', name: '大房子', fn: createLargeHouse, pos: [1, 0, -6] },
  { cat: 'facility', name: '面包房', fn: createBakery, pos: [-14, 0, 2] },
  { cat: 'facility', name: '作坊', fn: createWorkshop, pos: [-14, 0, -6] },
  { cat: 'facility', name: '市集摊位', fn: createMarketStall, pos: [8, 0, 2] },
  { cat: 'facility', name: '水井', fn: createWell, pos: [8, 0, -6] },
  { cat: 'facility', name: '长椅', fn: createBench, pos: [14, 0, 2] },
  { cat: 'facility', name: '路灯', fn: createStreetLamp, pos: [14, 0, -1] },
  { cat: 'facility', name: '农田', fn: createFarmPlot, pos: [14, 0, -6] },
  { cat: 'decoration', name: '花坛', fn: createFlowerBed, pos: [-14, 0, 9] },
  { cat: 'decoration', name: '小树', fn: createSmallTree, pos: [-7, 0, 9] },
  { cat: 'decoration', name: '中树', fn: createMediumTree, pos: [0, 0, 9] },
  { cat: 'decoration', name: '大树', fn: createLargeTree, pos: [7, 0, 9] },
  { cat: 'decoration', name: '栅栏 x1', fn: createFence, pos: [14, 0, 7.5] },
  { cat: 'decoration', name: '栅栏 x2', fn: createFence, pos: [14, 0, 9.6],
    connect: [{ to: 16, dx: 1, dz: 0 }] }, // will be connected to next fence via helper
  { cat: 'decoration', name: '栅栏 x2b', fn: createFence, pos: [16.05, 0, 9.6] },
  { cat: 'decoration', name: '栅栏 L1', fn: createFence, pos: [14, 0, 11.7] },
  { cat: 'decoration', name: '栅栏 L2', fn: createFence, pos: [16.05, 0, 11.7] },

  { cat: 'decoration', name: '稻草人', fn: createScarecrow, pos: [-14, 0, -10] },
];

const allGroups = allBuildings.map((b, i) => {
  const group = b.fn({ name: b.name });
  group.position.set(b.pos[0], b.pos[1], b.pos[2]);
  group.userData.buildingName = b.name;
  group.userData.category = b.cat;
  scene.add(group);
  mergeGroupMeshes(group);
  return group;
});

// Init hover cache (called after all groups are built, deferred)
setTimeout(() => rebuildHoverCache(), 200);

// Connect fences: check all pairs within range
setTimeout(() => {
  for (let i = 0; i < allGroups.length; i++) {
    for (let j = i + 1; j < allGroups.length; j++) {
      const ai = allBuildings[i], aj = allBuildings[j];
      if (ai.cat === 'decoration' && ai.name.includes('栅栏') && aj.cat === 'decoration' && aj.name.includes('栅栏')) {
        connectFences(allGroups[i], allGroups[j]);
      }
    }
  }
}, 100);

// ─── UI handling ────────────────────────────
const catButtons = document.querySelectorAll('#ui button[data-cat]');
catButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    const cat = btn.dataset.cat;
    catButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    allGroups.forEach((g, i) => {
      g.visible = cat === 'all' || allBuildings[i].cat === cat;
    });
    rebuildHoverCache();
  });
});

document.getElementById('btn-reset').addEventListener('click', () => {
  camera.position.set(10, 7, 10);
  controls.target.set(0, 0.8, 0);
  controls.update();
});

// ─── Animation loop ─────────────────────────
const clock = new THREE.Clock();
const mouse = new THREE.Vector2();
const raycaster = new THREE.Raycaster();
const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

// ─── Hover tooltip tracking ────────────────
const tooltip = document.getElementById('tooltip');
const hoverMouse = new THREE.Vector2();
let hoveredMesh = null;
let hoverStart = 0;
const HOVER_DELAY = 1000;
let hoverDirty = false;
let hoverCheckFrame = 0;
let cachedHoverMeshes = [];

function rebuildHoverCache() {
  cachedHoverMeshes = [];
  allGroups.forEach(hg => {
    if (!hg.visible) return;
    hg.traverse(c => { if (c instanceof THREE.Mesh) cachedHoverMeshes.push(c); });
  });
}

renderer.domElement.addEventListener('mousemove', (e) => {
  hoverMouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  hoverMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top = (e.clientY - 10) + 'px';
  hoverDirty = true;
});

const fpsEl = document.getElementById('fps');
let fpsFrames = 0, fpsTime = performance.now();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);
  controls.update();

  // FPS counter
  fpsFrames++;
  const now = performance.now();
  if (now - fpsTime >= 500) {
    fpsEl.textContent = 'FPS: ' + Math.round(fpsFrames / ((now - fpsTime) / 1000));
    fpsFrames = 0; fpsTime = now;
  }

  // Hover detection — only on mouse move, throttled every 10 frames
  if (hoverDirty) {
    hoverCheckFrame++;
    if (hoverCheckFrame % 10 === 0) {
      raycaster.setFromCamera(hoverMouse, camera);
      const hits = raycaster.intersectObjects(cachedHoverMeshes, false);
      const hitMesh = hits.length > 0 ? hits[0].object : null;
      if (hitMesh !== hoveredMesh) {
        hoveredMesh = hitMesh;
        hoverStart = performance.now();
        tooltip.style.display = 'none';
      } else if (hitMesh && performance.now() - hoverStart > HOVER_DELAY) {
        // tooltip disabled (debug only)
      }
      hoverDirty = false;
    }
  }

  // Dynamic focus for Bokeh
  mouse.set(0, 0);
  raycaster.setFromCamera(mouse, camera);
  const focusHit = new THREE.Vector3();
  if (raycaster.ray.intersectPlane(groundPlane, focusHit)) {
    bokehPass.uniforms['focus'].value = camera.position.distanceTo(focusHit);
  }
  composer.render();
}
animate();

// ─── Resize ─────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});
</script>
